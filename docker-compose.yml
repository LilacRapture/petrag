services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build: .
    env_file: .env
    ports:
      - "8001:8000"
    volumes:
      # Read-only mount of the whole sources/ dir — covers every project
      # symlinked inside it (tasktracker, dnd_backend, fairytale, ...),
      # so adding a new project needs a symlink here, not a new compose line.
      - ./sources:/sources:ro
    depends_on:
      - qdrant
    extra_hosts:
      # Docker Desktop for Mac resolves host.docker.internal automatically;
      # this line is only needed if you ever run this on Linux.
      - "host.docker.internal:host-gateway"

volumes:
  qdrant_data:
